[package]
  cjc-version = "1.0.0"
  name = "cmp"
  description = "multiplatform package selected for unittest"
  version = "1.0.0"
  output-type = "dynamic"
  compile-option = ""
  override-compile-option = ""
  link-option = ""
  package-configuration = {}

[[feature]]
  names = ["user.cmp.arch.big", "user.cmp.arch.little"]

[[source-set]]
  src-dir = "./common"
  features = []

[[source-set]]
  src-dir = "./platformA"
  features = ["user.cmp.arch.big"]

[[source-set]]
  src-dir = "./platformB"
  features = ["user.cmp.arch.little"]
