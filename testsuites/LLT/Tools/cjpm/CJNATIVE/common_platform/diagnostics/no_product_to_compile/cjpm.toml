[package]
  cjc-version = "1.0.0"
  name = "no_product_to_compile"
  description = "nothing here"
  version = "1.0.0"
  target-dir = ""
  output-type = "executable"
  compile-option = ""
  override-compile-option = ""
  link-option = ""
  package-configuration = {}

[dependencies]

[profile]
  experimental = true

[[feature]]
  name = "user.no_product_to_compile.arch.x86"
  mapping = []

[[source-set]]
  name = "common"
  src-dir = "./src/common"
  features = []

[[source-set]]
  name = "linux"
  src-dir = "./src/linux"
  features = ["os.linux"]

[[source-set]]
  name = "linux_x86"
  src-dir = "./src/linux_x86"
  features = ["os.linux", "user.no_product_to_compile.arch.x86"]
