[profile]
  experimental = true

[profile.build]
  performance_analysis = true

[package]
  cjc-version = "1.0.0"
  name = "mpp_perf"
  description = "cover performance mapping for multiplatform source sets"
  version = "1.0.0"
  output-type = "executable"
  compile-option = ""
  override-compile-option = ""
  link-option = ""
  package-configuration = {}

[[feature]]
  name = "user.mpp_perf.platform"
  mapping = []

[[source-set]]
  src-dir = "./common"
  features = []

[[source-set]]
  src-dir = "./platform"
  features = ["user.mpp_perf.platform"]
